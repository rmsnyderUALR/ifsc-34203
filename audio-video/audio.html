<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Integration</title>
</head>
<body>
    <header>
        <h1>HTML5 Audio</h1>
    </header>
    <audio controls="controls">
        <source src="assets/audio/thunder.mp3" type="audio/mp3">
        <source src="assets/audio/thunder.ogg" type="audio/ogg">

    </audio>
</body>
</html>
